<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playful Dashboard — ADHD App Direction 3</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #FAFBFC;
    --coral: #FF6B6B;
    --periwinkle: #7B8CFF;
    --sunny: #FFD93D;
    --mint: #6BCB77;
    --text: #2D3436;
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 390px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    padding-bottom: 80px;
  }

  /* === STICKER TOAST === */
  .toast {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 360px;
    width: calc(100% - 30px);
    background: #fff;
    border-radius: 14px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    z-index: 100;
    animation: toast-slide 0.5s ease-out;
    border-left: 4px solid var(--sunny);
  }
  @keyframes toast-slide {
    from { transform: translateX(-50%) translateY(-100%); opacity: 0; }
    to { transform: translateX(-50%) translateY(0); opacity: 1; }
  }
  .toast-emoji { font-size: 24px; }
  .toast-text { font-size: 14px; font-weight: 600; flex: 1; }
  .toast-close {
    background: none; border: none; font-size: 18px; cursor: pointer; opacity: 0.4;
    padding: 4px;
  }

  /* === GREETING CARD === */
  .greeting {
    background: linear-gradient(135deg, rgba(255,107,107,0.08), rgba(123,140,255,0.08));
    padding: 28px 20px 20px;
    margin: 60px 15px 0;
    border-radius: 20px;
  }
  .greeting h1 {
    font-family: 'DM Sans', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .greeting p {
    font-size: 14px;
    opacity: 0.65;
    font-weight: 500;
  }

  /* === QUICK ACTIONS === */
  .quick-actions {
    display: flex;
    gap: 8px;
    padding: 16px 15px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .quick-actions::-webkit-scrollbar { display: none; }
  .action-pill {
    flex-shrink: 0;
    padding: 10px 18px;
    border-radius: 20px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: inherit;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .action-pill:active { transform: scale(0.95); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .pill-checkin { background: var(--coral); }
  .pill-journal { background: var(--periwinkle); }
  .pill-focus { background: var(--mint); }
  .pill-stickers { background: var(--sunny); color: var(--text); }

  /* === CARDS === */
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    margin: 0 15px 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .card-title {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 14px;
  }

  /* Energy buttons */
  .energy-row {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  .energy-btn {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: 2px solid transparent;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: #f5f5f5;
  }
  .energy-btn:active { transform: scale(0.96); }
  .energy-btn.low { border-color: var(--periwinkle); background: rgba(123,140,255,0.08); color: var(--periwinkle); }
  .energy-btn.med { border-color: var(--sunny); background: rgba(255,217,61,0.1); color: #B8960A; }
  .energy-btn.high { border-color: var(--coral); background: rgba(255,107,107,0.08); color: var(--coral); }
  .energy-btn.selected {
    color: #fff;
  }
  .energy-btn.med.selected { background: var(--sunny); color: var(--text); }

  /* Habit checkboxes */
  .habits { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
  .habit {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
  }
  .habit-check {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 2px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .habit-check::after {
    content: '✓';
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transform: scale(0);
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .habit.checked .habit-check::after {
    opacity: 1;
    transform: scale(1);
  }
  .habit.checked .habit-check {
    border-color: transparent;
  }
  .habit:nth-child(1) .habit-check { border-color: var(--coral); }
  .habit:nth-child(1).checked .habit-check { background: var(--coral); }
  .habit:nth-child(2) .habit-check { border-color: var(--periwinkle); }
  .habit:nth-child(2).checked .habit-check { background: var(--periwinkle); }
  .habit:nth-child(3) .habit-check { border-color: var(--mint); }
  .habit:nth-child(3).checked .habit-check { background: var(--mint); }
  .habit:nth-child(4) .habit-check { border-color: var(--sunny); }
  .habit:nth-child(4).checked .habit-check { background: var(--sunny); }
  .habit:nth-child(5) .habit-check { border-color: var(--periwinkle); }
  .habit:nth-child(5).checked .habit-check { background: var(--periwinkle); }
  .habit.checked .habit-text { text-decoration: line-through; opacity: 0.5; }

  /* Emotion grid */
  .emotion-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 16px;
  }
  .emotion-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 4px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    border: none;
    font-family: inherit;
  }
  .emotion-cell:active { transform: scale(0.92); }
  .emotion-cell:hover { background: rgba(0,0,0,0.03); }
  .emo-circle {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .emo-circle.c1 { background: rgba(255,107,107,0.12); }
  .emo-circle.c2 { background: rgba(123,140,255,0.12); }
  .emo-circle.c3 { background: rgba(107,203,119,0.12); }
  .emo-circle.c4 { background: rgba(255,217,61,0.15); }
  .emo-name { font-size: 10px; font-weight: 600; opacity: 0.6; }

  /* === DID YOU KNOW === */
  .dyk-card {
    background: #FFFBEB;
    border-radius: 16px;
    padding: 18px 20px;
    margin: 0 15px 12px;
    position: relative;
    border: 1px solid rgba(255,217,61,0.3);
  }
  .dyk-title {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: #B8960A;
    margin-bottom: 6px;
  }
  .dyk-text {
    font-size: 13px;
    line-height: 1.5;
    opacity: 0.8;
  }
  .dyk-close {
    position: absolute;
    top: 12px; right: 12px;
    background: none; border: none;
    font-size: 16px; cursor: pointer; opacity: 0.3;
    padding: 4px;
  }

  /* === BOTTOM TAB BAR === */
  .tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-width: 390px;
    margin: 0 auto;
    background: #fff;
    display: flex;
    justify-content: space-around;
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom, 0));
    border-top: 1px solid #eee;
    z-index: 50;
  }
  .tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 6px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    background: none;
    border: none;
    font-family: inherit;
  }
  .tab-icon { font-size: 20px; }
  .tab-label { font-size: 10px; font-weight: 600; opacity: 0.4; }
  .tab.active {
    background: rgba(255,107,107,0.08);
  }
  .tab.active .tab-label {
    color: var(--coral);
    opacity: 1;
  }

  /* === FAB === */
  .fab {
    position: fixed;
    bottom: 76px;
    right: calc(50% - 195px + 20px);
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--coral);
    color: #fff;
    border: none;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(255,107,107,0.4);
    z-index: 55;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .fab:active {
    transform: scale(0.92);
    box-shadow: 0 2px 8px rgba(255,107,107,0.3);
  }

  @media (min-width: 420px) {
    .fab { right: calc(50% - 195px + 20px); }
  }
</style>
</head>
<body>

<!-- Sticker Toast -->
<div class="toast">
  <span class="toast-emoji">🌟</span>
  <span class="toast-text">New sticker earned!</span>
  <button class="toast-close">✕</button>
</div>

<!-- Greeting -->
<div class="greeting">
  <h1>Hey Ben 👋</h1>
  <p>You've been sleeping better this week ✨</p>
</div>

<!-- Quick Actions -->
<div class="quick-actions">
  <button class="action-pill pill-checkin">Check in</button>
  <button class="action-pill pill-journal">Journal</button>
  <button class="action-pill pill-focus">Focus</button>
  <button class="action-pill pill-stickers">Stickers</button>
</div>

<!-- Today's Check-in -->
<div class="card">
  <div class="card-title">How's your energy?</div>
  <div class="energy-row">
    <button class="energy-btn low">🔋 Low</button>
    <button class="energy-btn med selected">⚡ Medium</button>
    <button class="energy-btn high">🔥 High</button>
  </div>

  <div class="habits">
    <label class="habit checked">
      <span class="habit-check"></span>
      <span class="habit-text">Medication</span>
    </label>
    <label class="habit checked">
      <span class="habit-check"></span>
      <span class="habit-text">Slept well</span>
    </label>
    <label class="habit">
      <span class="habit-check"></span>
      <span class="habit-text">Exercise</span>
    </label>
    <label class="habit checked">
      <span class="habit-check"></span>
      <span class="habit-text">No sugar</span>
    </label>
    <label class="habit">
      <span class="habit-check"></span>
      <span class="habit-text">No alcohol</span>
    </label>
  </div>

  <div class="card-title" style="margin-top:8px;">How are you feeling?</div>
  <div class="emotion-grid">
    <button class="emotion-cell"><span class="emo-circle c1">😊</span><span class="emo-name">Happy</span></button>
    <button class="emotion-cell"><span class="emo-circle c2">😌</span><span class="emo-name">Calm</span></button>
    <button class="emotion-cell"><span class="emo-circle c3">😤</span><span class="emo-name">Wired</span></button>
    <button class="emotion-cell"><span class="emo-circle c4">😴</span><span class="emo-name">Tired</span></button>
    <button class="emotion-cell"><span class="emo-circle c1">😰</span><span class="emo-name">Anxious</span></button>
    <button class="emotion-cell"><span class="emo-circle c2">😔</span><span class="emo-name">Low</span></button>
    <button class="emotion-cell"><span class="emo-circle c3">🤩</span><span class="emo-name">Hyped</span></button>
    <button class="emotion-cell"><span class="emo-circle c4">😐</span><span class="emo-name">Meh</span></button>
  </div>
</div>

<!-- Did You Know -->
<div class="dyk-card">
  <button class="dyk-close">✕</button>
  <div class="dyk-title">💡 Did You Know?</div>
  <div class="dyk-text">People with ADHD have 20% fewer dopamine receptors. You're not lazy — your brain is hungry.</div>
</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <button class="tab active"><span class="tab-icon">🏠</span><span class="tab-label">Home</span></button>
  <button class="tab"><span class="tab-icon">🧰</span><span class="tab-label">Toolbox</span></button>
  <button class="tab"><span class="tab-icon">📖</span><span class="tab-label">Journal</span></button>
  <button class="tab"><span class="tab-icon">⭐</span><span class="tab-label">Stickers</span></button>
</div>

<!-- FAB -->
<button class="fab">🎤</button>

</body>
</html>
