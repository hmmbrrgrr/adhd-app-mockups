<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collectible Art Piece — ADHD App Direction 4</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #F2E8D5;
    --ink: #3A2618;
    --primary: #D4735E;
    --secondary: #4A7C59;
    --accent: #5B8DB8;
    --gold: #C9A94E;
  }
  body {
    font-family: 'Lora', serif;
    background: var(--bg);
    color: var(--ink);
    max-width: 390px;
    margin: 0 auto;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* === PAPER TEXTURE === */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
    max-width: 390px;
    left: 50%;
    transform: translateX(-50%);
  }

  /* === DISCOVERY BANNER === */
  .discovery-banner {
    position: relative;
    z-index: 10;
    margin: 12px 15px 0;
    background: linear-gradient(135deg, #FDF6E3, #F2E8D5);
    border: 2px solid var(--gold);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 12px rgba(201,169,78,0.2);
  }
  .discovery-banner .text {
    flex: 1;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
  }
  /* Sketch to color building */
  .sketch-color {
    display: flex;
    width: 80px; height: 50px;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sketch-half, .color-half {
    width: 50%; height: 100%;
    position: relative;
  }
  .sketch-half {
    background: #E8DCC8;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sketch-half::after {
    content: '';
    width: 22px; height: 30px;
    border: 2px solid #999;
    border-radius: 2px;
    position: relative;
  }
  .sketch-half::before {
    content: '';
    position: absolute;
    top: 4px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-bottom: 12px solid #aaa;
  }
  .color-half {
    background: var(--secondary);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .color-half::after {
    content: '';
    width: 22px; height: 30px;
    background: var(--primary);
    border-radius: 2px;
  }
  .color-half::before {
    content: '';
    position: absolute;
    top: 4px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-bottom: 12px solid var(--gold);
  }

  /* === LANDSCAPE SCENE === */
  .scene {
    position: relative;
    width: 100%;
    height: 540px;
    overflow: hidden;
    z-index: 2;
  }

  /* Sky */
  .sky-layer {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #D4C4A8 0%, #E8D8B8 30%, #DECE B0 60%, var(--bg) 100%);
    background: linear-gradient(180deg, #C8BDA4 0%, #D8CAAA 25%, #E2D5B8 50%, var(--bg) 100%);
  }

  /* Sun/moon */
  .celestial {
    position: absolute;
    top: 25px; right: 60px;
    width: 50px; height: 50px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #F5E6B8, #E8D4A0 60%, #D4C08800);
    box-shadow: 0 0 30px 10px rgba(201,169,78,0.2);
  }

  /* Clouds */
  .map-cloud {
    position: absolute;
    background: rgba(255,255,255,0.25);
    border-radius: 50px;
    height: 18px;
  }
  .map-cloud::before {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
  }
  .mc-1 { width: 60px; top: 35px; left: 30px; }
  .mc-1::before { width: 28px; height: 28px; top: -14px; left: 14px; }
  .mc-2 { width: 45px; top: 55px; left: 180px; }
  .mc-2::before { width: 22px; height: 22px; top: -11px; left: 10px; }

  /* Hills - layered */
  .hill-layer {
    position: absolute;
    border-radius: 50%;
  }
  .hl-1 {
    width: 600px; height: 400px;
    bottom: -80px; left: -150px;
    background: linear-gradient(180deg, #6B8F58, #4A7C59 40%, #3D6A4C);
  }
  .hl-2 {
    width: 500px; height: 350px;
    bottom: -100px; right: -180px;
    background: linear-gradient(180deg, #5D8350, #4A7048 40%, #3E6040);
  }
  .hl-3 {
    width: 450px; height: 280px;
    bottom: -80px; left: -30px;
    background: linear-gradient(180deg, #5A7E4E, #4D7045);
  }

  /* Foreground ground */
  .ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 140px;
    background: linear-gradient(180deg, #5A7E4E, #4D6E44 40%, #3E5E38);
    border-radius: 50% 50% 0 0 / 30px 30px 0 0;
  }

  /* Winding path */
  .winding-path {
    position: absolute;
    bottom: 0;
    left: 40%;
    width: 50px;
    height: 300px;
    z-index: 5;
  }
  .winding-path::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent, #C4A87044 20%, #C4A870 50%);
    clip-path: polygon(
      35% 0%, 65% 0%,
      75% 15%, 55% 25%,
      70% 35%, 50% 45%,
      65% 55%, 45% 65%,
      60% 75%, 40% 85%,
      55% 95%, 45% 100%, 30% 100%,
      40% 90%, 30% 80%,
      45% 70%, 30% 60%,
      50% 50%, 35% 40%,
      55% 30%, 40% 20%,
      55% 10%, 40% 0%
    );
  }

  /* === LIGHTHOUSE === */
  .lighthouse {
    position: absolute;
    right: 30px;
    bottom: 220px;
    z-index: 6;
  }
  .lh-tower {
    width: 18px; height: 60px;
    background: linear-gradient(90deg, #E8DCC8, #D4C8B4);
    margin: 0 auto;
    position: relative;
    clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);
  }
  .lh-stripe {
    position: absolute;
    left: 0; right: 0;
    height: 10px;
    background: var(--primary);
  }
  .lh-stripe:nth-child(1) { top: 10px; }
  .lh-stripe:nth-child(2) { top: 30px; }
  .lh-stripe:nth-child(3) { top: 50px; }
  .lh-top {
    width: 24px; height: 14px;
    background: var(--ink);
    border-radius: 4px 4px 0 0;
    margin: 0 auto -2px;
    position: relative;
  }
  .lh-beacon {
    position: absolute;
    top: -8px; left: 50%;
    transform: translateX(-50%);
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 16px 6px rgba(201,169,78,0.5);
    animation: beacon-pulse 2.5s ease-in-out infinite;
  }
  @keyframes beacon-pulse {
    0%, 100% { box-shadow: 0 0 16px 6px rgba(201,169,78,0.4); }
    50% { box-shadow: 0 0 30px 12px rgba(201,169,78,0.7); }
  }
  .lh-cliff {
    width: 60px; height: 25px;
    background: linear-gradient(180deg, #7A6B50, #5A4E38);
    border-radius: 30% 60% 0 0;
    margin-top: -2px;
    margin-left: -20px;
  }

  /* === COTTAGE === */
  .art-cottage {
    position: absolute;
    left: 25px;
    bottom: 175px;
    z-index: 6;
  }
  .ac-roof {
    width: 0; height: 0;
    border-left: 30px solid transparent;
    border-right: 30px solid transparent;
    border-bottom: 22px solid #8B5E3C;
    margin-left: -5px;
  }
  .ac-body {
    width: 50px; height: 32px;
    background: linear-gradient(135deg, #D4A574, #C4956A);
    border-radius: 2px;
    position: relative;
  }
  .ac-door {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 12px; height: 18px;
    background: #7A4E2C;
    border-radius: 6px 6px 0 0;
  }
  .ac-window {
    position: absolute;
    top: 6px;
    width: 10px; height: 10px;
    background: var(--gold);
    border-radius: 2px;
    opacity: 0.8;
  }
  .ac-window.l { left: 5px; }
  .ac-window.r { right: 5px; }
  /* Garden patches */
  .garden-patches {
    display: flex;
    gap: 3px;
    margin-top: 2px;
    margin-left: -8px;
  }
  .garden-patch {
    width: 8px; height: 6px;
    border-radius: 50%;
  }
  .gp-1 { background: var(--primary); }
  .gp-2 { background: var(--gold); }
  .gp-3 { background: var(--accent); }
  .gp-4 { background: var(--primary); }
  .gp-5 { background: var(--secondary); }
  .gp-6 { background: var(--gold); }
  .gp-7 { background: var(--primary); }
  .gp-8 { background: var(--accent); }

  /* === MARKET === */
  .market {
    position: absolute;
    left: 120px;
    bottom: 195px;
    z-index: 6;
  }
  .stall {
    display: flex;
    gap: 4px;
  }
  .stall-unit {
    width: 22px; height: 18px;
    border-radius: 3px 3px 0 0;
    position: relative;
  }
  .stall-unit::after {
    content: '';
    position: absolute;
    top: -6px; left: -2px; right: -2px;
    height: 8px;
    border-radius: 4px 4px 0 0;
  }
  .su-1 { background: #D4A574; }
  .su-1::after { background: var(--primary); }
  .su-2 { background: #C4956A; }
  .su-2::after { background: var(--accent); }
  .su-3 { background: #D4B080; }
  .su-3::after { background: var(--gold); }
  /* Bunting */
  .bunting {
    display: flex;
    gap: 2px;
    margin-bottom: 3px;
    padding-left: 2px;
  }
  .flag {
    width: 6px; height: 8px;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
  }
  .f1 { background: var(--primary); }
  .f2 { background: var(--gold); }
  .f3 { background: var(--accent); }
  .f4 { background: var(--secondary); }
  .f5 { background: var(--primary); }
  .f6 { background: var(--gold); }

  /* === HARBOR & BOAT === */
  .harbor {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 7;
  }
  .boat-body {
    width: 50px; height: 14px;
    background: linear-gradient(180deg, #8B6944, #6B5234);
    border-radius: 0 0 50% 50%;
    position: relative;
  }
  .mast {
    position: absolute;
    left: 50%; bottom: 100%;
    transform: translateX(-50%);
    width: 2px; height: 30px;
    background: #5A4430;
  }
  .sail {
    position: absolute;
    left: 4px; bottom: 4px;
    width: 0; height: 0;
    border-right: 18px solid rgba(232,220,200,0.9);
    border-top: 10px solid transparent;
    border-bottom: 14px solid transparent;
  }
  .water-line {
    width: 70px; height: 4px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 2px;
    margin-top: 2px;
    opacity: 0.4;
  }

  /* === MAP LABELS === */
  .map-label {
    position: absolute;
    z-index: 10;
    font-family: 'Playfair Display', serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    cursor: pointer;
    animation: label-breathe 4s ease-in-out infinite;
    text-shadow: 0 1px 2px rgba(242,232,213,0.8);
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  @keyframes label-breathe {
    0%, 100% { transform: scale(1) rotate(var(--rot, 0deg)); }
    50% { transform: scale(1.02) rotate(var(--rot, 0deg)); }
  }
  .map-label::after {
    content: '';
    display: block;
    width: 100%;
    height: 1px;
    background: var(--ink);
    opacity: 0.3;
    margin-top: 1px;
    position: relative;
  }
  .map-label::before {
    content: '~';
    position: absolute;
    right: -10px;
    bottom: 0;
    font-size: 10px;
    opacity: 0.3;
  }

  .label-insights { top: 195px; right: 18px; --rot: -3deg; transform: rotate(-3deg); }
  .label-collection { top: 260px; left: 108px; --rot: 2deg; transform: rotate(2deg); animation-delay: -1s; }
  .label-checkin { top: 240px; left: 12px; --rot: -2deg; transform: rotate(-2deg); animation-delay: -2s; }
  .label-deepdive { bottom: 55px; left: 50%; --rot: 1deg; transform: translateX(-50%) rotate(1deg); animation-delay: -3s; }

  /* === COMPASS ROSE === */
  .compass {
    position: absolute;
    top: 15px; left: 15px;
    z-index: 10;
    width: 40px; height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--ink);
    opacity: 0.5;
  }
  .compass-ring {
    width: 36px; height: 36px;
    border: 1.5px solid var(--ink);
    border-radius: 50%;
    position: absolute;
    opacity: 0.3;
  }
  .compass-n, .compass-s, .compass-e, .compass-w {
    position: absolute;
    font-family: 'Playfair Display', serif;
    font-size: 8px;
    font-weight: 700;
  }
  .compass-n { top: 1px; }
  .compass-s { bottom: 1px; }
  .compass-e { right: 2px; }
  .compass-w { left: 3px; }
  .compass-center {
    font-size: 14px;
    opacity: 0.5;
  }

  /* === VOICE POST === */
  .voice-post {
    position: absolute;
    bottom: 90px;
    right: 25px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
  }
  .voice-horn {
    font-size: 28px;
    animation: label-breathe 3s ease-in-out infinite;
  }
  .voice-pole {
    width: 4px; height: 30px;
    background: linear-gradient(180deg, #8B6944, #6B5234);
    border-radius: 2px;
    margin-top: -4px;
  }
  .voice-base {
    width: 16px; height: 6px;
    background: #6B5234;
    border-radius: 2px;
  }

  /* === CHECK-IN PANEL === */
  .checkin-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-width: 390px;
    margin: 0 auto;
    z-index: 50;
  }
  .checkin-parchment {
    background: linear-gradient(180deg, #F2E8D5, #EDE0CC);
    padding: 28px 20px 40px;
    box-shadow: 0 -8px 30px rgba(58,38,24,0.15);
    position: relative;
    /* Jagged torn top edge */
    clip-path: polygon(
      0% 8%, 3% 5%, 6% 9%, 9% 4%, 12% 7%, 15% 3%, 18% 8%, 21% 5%, 24% 9%, 27% 4%,
      30% 7%, 33% 3%, 36% 8%, 39% 5%, 42% 9%, 45% 4%, 48% 7%, 51% 3%,
      54% 8%, 57% 5%, 60% 9%, 63% 4%, 66% 7%, 69% 3%, 72% 8%, 75% 5%,
      78% 9%, 81% 4%, 84% 7%, 87% 3%, 90% 8%, 93% 5%, 96% 9%, 100% 5%,
      100% 100%, 0% 100%
    );
  }
  .checkin-parchment::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
  }
  .checkin-q {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    margin: 12px 0 24px;
    color: var(--ink);
    line-height: 1.4;
  }
  .weather-row {
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  .weather-card {
    width: 56px;
    padding: 10px 6px;
    border: 1.5px solid var(--ink);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(242,232,213,0.5);
    opacity: 0.7;
  }
  .weather-card:hover, .weather-card.selected {
    opacity: 1;
    background: rgba(201,169,78,0.1);
    border-color: var(--gold);
    transform: scale(1.05);
  }
  .weather-card .w-icon { font-size: 22px; }
  .weather-card .w-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<!-- Discovery Banner -->
<div class="discovery-banner">
  <div class="text">🗺️ New area discovered!</div>
  <div class="sketch-color">
    <div class="sketch-half"></div>
    <div class="color-half"></div>
  </div>
</div>

<!-- Scene -->
<div class="scene">
  <div class="sky-layer"></div>
  <div class="celestial"></div>
  <div class="map-cloud mc-1"></div>
  <div class="map-cloud mc-2"></div>

  <!-- Compass -->
  <div class="compass">
    <div class="compass-ring"></div>
    <span class="compass-n">N</span>
    <span class="compass-s">S</span>
    <span class="compass-e">E</span>
    <span class="compass-w">W</span>
    <span class="compass-center">✦</span>
  </div>

  <!-- Hills -->
  <div class="hill-layer hl-1"></div>
  <div class="hill-layer hl-2"></div>
  <div class="hill-layer hl-3"></div>
  <div class="ground"></div>

  <!-- Winding path -->
  <div class="winding-path"></div>

  <!-- Lighthouse -->
  <div class="lighthouse">
    <div class="lh-top">
      <div class="lh-beacon"></div>
    </div>
    <div class="lh-tower">
      <div class="lh-stripe"></div>
      <div class="lh-stripe"></div>
      <div class="lh-stripe"></div>
    </div>
    <div class="lh-cliff"></div>
  </div>

  <!-- Cottage -->
  <div class="art-cottage">
    <div class="ac-roof"></div>
    <div class="ac-body">
      <div class="ac-window l"></div>
      <div class="ac-window r"></div>
      <div class="ac-door"></div>
    </div>
    <div class="garden-patches">
      <div class="garden-patch gp-1"></div>
      <div class="garden-patch gp-2"></div>
      <div class="garden-patch gp-3"></div>
      <div class="garden-patch gp-4"></div>
      <div class="garden-patch gp-5"></div>
      <div class="garden-patch gp-6"></div>
      <div class="garden-patch gp-7"></div>
      <div class="garden-patch gp-8"></div>
    </div>
  </div>

  <!-- Market -->
  <div class="market">
    <div class="bunting">
      <div class="flag f1"></div>
      <div class="flag f2"></div>
      <div class="flag f3"></div>
      <div class="flag f4"></div>
      <div class="flag f5"></div>
      <div class="flag f6"></div>
    </div>
    <div class="stall">
      <div class="stall-unit su-1"></div>
      <div class="stall-unit su-2"></div>
      <div class="stall-unit su-3"></div>
    </div>
  </div>

  <!-- Harbor & Boat -->
  <div class="harbor">
    <div class="boat-body">
      <div class="mast">
        <div class="sail"></div>
      </div>
    </div>
    <div class="water-line"></div>
  </div>

  <!-- Voice post -->
  <div class="voice-post">
    <div class="voice-horn">📣</div>
    <div class="voice-pole"></div>
    <div class="voice-base"></div>
  </div>

  <!-- Labels -->
  <div class="map-label label-insights">Insights</div>
  <div class="map-label label-collection">Collection</div>
  <div class="map-label label-checkin">Check In</div>
  <div class="map-label label-deepdive">Deep Dive</div>
</div>

<!-- Check-in Panel -->
<div class="checkin-panel">
  <div class="checkin-parchment">
    <div class="checkin-q">What's the weather<br>like inside you today?</div>
    <div class="weather-row">
      <div class="weather-card">
        <span class="w-icon">☀️</span>
        <span class="w-label">Clear</span>
      </div>
      <div class="weather-card">
        <span class="w-icon">⛅</span>
        <span class="w-label">Mixed</span>
      </div>
      <div class="weather-card selected">
        <span class="w-icon">☁️</span>
        <span class="w-label">Cloudy</span>
      </div>
      <div class="weather-card">
        <span class="w-icon">🌧️</span>
        <span class="w-label">Rainy</span>
      </div>
      <div class="weather-card">
        <span class="w-icon">⛈️</span>
        <span class="w-label">Stormy</span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
